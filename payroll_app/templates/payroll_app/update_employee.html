{% extends 'payroll_app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Update Employee</h2>
        <form method="POST" action="{% url 'update_employee' employee.pk %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Name:</label>
                <input type="text" class="form-control" name="name" value="{{ employee.name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">ID Number:</label>
                <input type="text" class="form-control" name="id_number" value="{{ employee.id_number }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Rate:</label>
                <input type="number" name="rate" id="rate" min="0.01" step="any" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Allowance (Optional):</label>
                <input type="number" class="form-control" name="allowance" value="{{ employee.allowance }}" step="0.01">
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
</div>
{% endblock %}
