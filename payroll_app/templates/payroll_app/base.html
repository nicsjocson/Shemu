<!DOCTYPE html>
<html lang="en">
<head>
    <title>Shemu Payroll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fff0f3;
        }
        .navbar {
            background-color: #6b2737 !important;
        }
        .navbar-brand {
            color: #ffd6e0 !important;
            font-weight: 700;
            font-size: 1.4rem;
        }
        .navbar-brand:hover {
            color: white !important;
        }
        .nav-link {
            color: #ffb3c1 !important;
            font-weight: 500;
        }
        .nav-link:hover {
            color: white !important;
        }
        .nav-link.active {
            color: white !important;
            font-weight: 700;
            border-bottom: 2px solid #ff6b8a;
        }
        footer {
            background-color: #6b2737 !important;
            color: #ffd6e0 !important;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Shemu</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
                           href="{% url 'home' %}">Employees Page</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'payslips' %}active{% endif %}"
                           href="{% url 'payslips' %}">Payslips Page</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4 flex-grow-1">
        {% block content %}
        {% endblock %}
    </div>
    <footer class="text-center py-3">
        &copy; 2026
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
