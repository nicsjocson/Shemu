<!DOCTYPE html>
<html lang="en">
<head>
    <title>Shemu Payroll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Shemu</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Employees Page</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'payslips' %}">Payslips Page</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-warning">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <footer class="text-center mt-5 mb-3 text-muted">
        &copy; 2026 Shemu Payroll App
    </footer>
</body>
</html>
