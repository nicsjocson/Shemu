<!DOCTYPE html>
<html lang="en">
<head>
    <title>Shemu Payroll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Shemu</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" 
                           href="{% url 'home' %}">Employees Page</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'payslips' %}active{% endif %}" 
                           href="{% url 'payslips' %}">Payslips Page</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4 flex-grow-1">
        {% block content %}
        {% endblock %}
    </div>
    <footer class="text-center py-3 bg-dark text-white">
        &copy; 2026
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
