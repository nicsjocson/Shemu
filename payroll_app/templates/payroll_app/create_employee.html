{% extends 'payroll_app/base.html' %}

{% block content %}
<style>
    .card-form {
        background: white;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(255, 150, 170, 0.15);
        max-width: 600px;
        margin: 0 auto;
    }
    h2 {
        color: #6b2737;
        font-weight: 700;
    }
    .form-label {
        color: #6b2737;
        font-weight: 600;
    }
    .form-control {
        border: 1.5px solid #ffb3c1;
        border-radius: 8px;
        background-color: #fff5f7;
        color: #6b2737;
    }
    .form-control:focus {
        border-color: #ff6b8a;
        box-shadow: 0 0 0 0.2rem rgba(255, 107, 138, 0.25);
        background-color: #fff5f7;
    }
    .btn-submit {
        background-color: #ff6b8a;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 8px 24px;
        font-weight: 600;
    }
    .btn-submit:hover {
        background-color: #e05575;
        color: white;
    }
</style>

<div class="card-form">
    <h2 class="mb-4">Create Employee</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'create_employee' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Name:</label>
            <input type="text" name="name" id="name" class="form-control" pattern="[a-zA-Z\s]+" title="Only letters and spaces are allowed" required>
        </div>
        <div class="mb-3">
            <label class="form-label">ID Number:</label>
            <input type="text" name="id_number" class="form-control" pattern="[0-9]+" title="ID Number must contain numbers only and must be positive" required>
        </div>
        <div class="mb-3">
            <label for="rate" class="form-label">Rate:</label>
            <input type="number" name="rate" id="rate" class="form-control" min="0.01" step="any" title="Rate must be greater than 0" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Allowance (Optional):</label>
            <input type="number" class="form-control" name="allowance" min="0" step="0.01" title="Allowance must be 0 or greater">
        </div>
        <button type="submit" class="btn btn-submit">Submit</button>
    </form>
</div>
{% endblock %}
