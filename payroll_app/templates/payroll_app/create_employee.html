{% extends 'payroll_app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Create Employee</h2>
        <form method="POST" action="{% url 'create_employee' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Name:</label>
                <input type="text" class="form-control" name="name" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">ID Number:</label>
                <input type="text" class="form-control" name="id_number" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Rate:</label>
                <input type="number" class="form-control" name="rate" step="0.01" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Allowance (Optional):</label>
                <input type="number" class="form-control" name="allowance" step="0.01">
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
</div>
{% endblock %}
